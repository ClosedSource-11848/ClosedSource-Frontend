@if (store.needsMaintenance().length > 0) {
  <mat-card class="alert-card shadow-sm">
    <mat-card-header>
      <div mat-card-avatar class="alert-icon-container">
        <mat-icon color="warn">priority_high</mat-icon>
      </div>
      <mat-card-title>Alertas de Calibración</mat-card-title>
      <mat-card-subtitle>Equipos que requieren intervención técnica inmediata</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <mat-list>
        @for (item of store.needsMaintenance(); track item.id) {
          <mat-list-item class="alert-item">
            <mat-icon matListItemIcon class="status-indicator">warning</mat-icon>
            <div matListItemTitle class="equipment-name">{{ item.name }}</div>
            <div matListItemLine class="equipment-meta">
              <span>Modelo: {{ item.model }}</span> |
              <span class="status-badge" [ngClass]="item.status.toLowerCase()">
                {{ item.status }}
              </span>
            </div>
            <button mat-icon-button matListItemMeta
                    [routerLink]="['/equipment/maintenance-form', item.id]"
                    matTooltip="Registrar Calibración">
              <mat-icon color="primary">build</mat-icon>
            </button>
          </mat-list-item>
        }
      </mat-list>
    </mat-card-content>

    <mat-card-actions align="end">
      <button mat-button color="warn" routerLink="/equipment/equipment-list">
        VER TODOS LOS EQUIPOS
      </button>
    </mat-card-actions>
  </mat-card>
}
