<div class="form-container">
  <mat-card class="config-card">
    <mat-card-header>
      <mat-card-title>Configuración de Parámetros BPM</mat-card-title>
      <mat-card-subtitle>Establece los rangos de tolerancia para el monitoreo de calidad</mat-card-subtitle>
    </mat-card-header>

    <form [formGroup]="form" (ngSubmit)="onSave()" class="config-form">
      <mat-card-content>
        <div class="form-grid">
          <!-- Parameter Name -->
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Nombre del Parámetro</mat-label>
            <input matInput formControlName="parameterName" placeholder="E.g. Temperatura Interna">
            <mat-icon matSuffix>label</mat-icon>
          </mat-form-field>

          <!-- Min Value -->
          <mat-form-field appearance="outline">
            <mat-label>Valor Mínimo</mat-label>
            <input matInput type="number" formControlName="minValue" placeholder="0.0">
          </mat-form-field>

          <!-- Max Value -->
          <mat-form-field appearance="outline">
            <mat-label>Valor Máximo</mat-label>
            <input matInput type="number" formControlName="maxValue" placeholder="100.0">
          </mat-form-field>

          <!-- Unit -->
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Unidad de Medida</mat-label>
            <input matInput formControlName="unit" placeholder="E.g. °C, %, bar, RPM">
          </mat-form-field>
        </div>

        @if (store.error()) {
          <div class="error-msg">
            <mat-icon>error</mat-icon>
            <span>{{ store.error() }}</span>
          </div>
        }
      </mat-card-content>

      <mat-card-actions align="end">
        <button mat-button type="button" [routerLink]="['/equipment/equipment-detail', equipmentId()]">
          {{ 'COMMON.ACTIONS.CANCEL' | translate }}
        </button>
        <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid || store.isLoading()">
          <mat-icon>settings_suggest</mat-icon>
          Guardar Configuración
        </button>
      </mat-card-actions>
    </form>
  </mat-card>
</div>
